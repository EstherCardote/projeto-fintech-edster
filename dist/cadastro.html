<!DOCTYPE html>
<html lang="pt=br">

<head>
    <meta charset="UTF-8">
    <!-- A linha abaixo Diz ao celular para não diminuir o site para caber na tela, mas sim usar a largura real do aparelho e o zoom em 100% -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Nova Conta - Estgar</title>
    <!-- Link para o CSS gerado pelo Tailwind -->
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-estgar-bege font-sans text-slate-800 min-h-screen flex items-center justify-center p-4">
    <main
        class="bg-white w-full max-w-6xl rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.1)] flex overflow-hidden min-h-175 max-h-[90vh]">

        <!-- LADO ESQUERDO (Formulário com rolagem independente) -->
        <section class="w-full md:w-3/5 p-8 md:p-12 flex flex-col h-full overflow-y-auto">
            <div class="w-full max-w-2xl mx-auto">
                <h1 class="text-4xl font-bold text-estgar-roxo mb-8 text-center md:text-left">Criar Nova Conta</h1>

                <form class="space-y-8">
                    <!-- SESSÃO: DADOS PESSOAIS -->
                    <div class=space-y-4>
                        <h2 class="text-lg font-bold text-slate-800 border-b border-gray-400 pb-2">Dados Pessoais</h2>

                        <!-- Grid para colocar Nome e Sobrenome lado a lado -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Primeiro Nome</label>
                                <input type="text"
                                    class="w-full p-3 bg-estgar-bege/30 border border-gray-300 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Sobrenome</label>
                                <input type="text"
                                    class="w-full p-3 bg-estgar-bege/30 border border-gray-300 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all">
                            </div>
                        </div>
                        <!-- Grid para CPF e Data de Nascimento -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">CPF</label>
                                <input type="text" placeholder="000.000.000-00"
                                    class="w-full p-3 bg-estgar-bege/30 border border-gray-300 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Data de
                                    Nascimento</label>
                                <input type="date"
                                    class="w-full p-3 bg-estgar-bege/30 border border-gray-300 rounded-xl focus:outline-none focus:border-estgar-roxo focus:ring-1 focus:ring-estgar-roxo transition-all text-slate-500 ">
                            </div>
                        </div>



                    </div>
                </form>
            </div>
        </section>

    </main>
</body>

</html>
